# ─────────────────────────────────────────────────────────────────────────────
#  rabbitmq.conf — STAGING
#
#  Консервативные лимиты под маленький сервер (77.222.32.244: 2 vCPU / ~1.9 GB RAM,
#  уже свопит). Дефолтный RabbitMQ берёт 40% RAM под high watermark (~760 MB здесь) —
#  это много, поэтому жёстко ограничиваем.
#
#  Management UI (плагин) включён образом rabbitmq:*-management, слушает 15672.
#  Наружу отдаётся через host-nginx на под-пути https://staging.spaceofjoy.ru/rabbitmq/
#  (+ basic-auth). path_prefix нужен, чтобы UI генерировал ссылки/ассеты под /rabbitmq/.
# ─────────────────────────────────────────────────────────────────────────────

# UI и HTTP API под под-путём /rabbitmq/ (за host-nginx, без отдельного сабдомена).
management.path_prefix = /rabbitmq

# Память: не даём брокеру раздуваться. Абсолютный порог вместо доли RAM.
vm_memory_high_watermark.absolute = 256MiB

# Диск: блокировать публикаторов, если свободного меньше 1 GB
# (дефолт 50 MB — слишком мало, легко переполнить).
disk_free_limit.absolute = 1GB

# Логи в stdout → видно через `docker logs rabbitmq-staging`.
log.console = true
log.console.level = info
log.file = false
