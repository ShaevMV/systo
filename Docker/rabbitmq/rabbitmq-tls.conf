# ─────────────────────────────────────────────────────────────────────────────
#  rabbitmq-tls.conf — AMQPS (mTLS) listener для внешней qr.spaceofjoy.ru (Ф3)
#
#  Монтируется в /etc/rabbitmq/conf.d/tls.conf (мерджится к rabbitmq.conf) ТОЛЬКО
#  когда серты готовы (см. gen-rabbitmq-mtls-certs.sh + RABBITMQ_CONNECT_STAGING.md).
#  ⚠️ Без файлов сертов брокер НЕ стартует — поэтому подключать ПОСЛЕ генерации сертов.
#
#  Серверный серт — Let's Encrypt (rabbitmq.staging.spaceofjoy.ru), qr верифицирует публично.
#  Клиентский серт qr — проверяется нашим client CA (ca-client.pem):
#    verify_peer + fail_if_no_peer_cert = клиент ОБЯЗАН предъявить валидный клиентский серт.
#  Поверх mTLS — обычная аутентификация пользователя qr_ingest (publish-only). Двойной барьер.
# ─────────────────────────────────────────────────────────────────────────────

# AMQPS-листенер (5671). Обычный AMQP (5672) остаётся для внутренних org/Baza по docker-сети.
listeners.ssl.default = 5671

ssl_options.certfile   = /etc/rabbitmq/certs/server.pem
ssl_options.keyfile    = /etc/rabbitmq/certs/server.key
ssl_options.cacertfile = /etc/rabbitmq/certs/ca-client.pem
ssl_options.verify     = verify_peer
ssl_options.fail_if_no_peer_cert = true

# Только современные протоколы.
ssl_options.versions.1 = tlsv1.3
ssl_options.versions.2 = tlsv1.2
