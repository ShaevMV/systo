; Override пула php-fpm под прод-нагрузку (пик продаж феста).
; Грузится ПОСЛЕ www.conf (z > w в php-fpm.d/) → переопределяет пул [www].
; Базовый www.conf официального php:8.2-fpm образа: pm.max_children=5 без
; request_terminate_timeout — мало под пик, а зависший upstream (DNS/БД/внешний
; вызов) занимал все 5 слотов и вешал весь сайт до 504. См. devops-разбор.
[www]
pm = dynamic
pm.max_children = 16
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 12
pm.max_requests = 500
; зависший запрос освобождает воркер за 60с (а не висит вечно)
request_terminate_timeout = 60s
