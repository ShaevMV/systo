# Codeception Acceptance Test Suite Configuration
#
# Perform tests in a real browser using WebDriver (Selenium Chrome)
# For testing DOM elements, page rendering, and user interactions

actor: AcceptanceTester
modules:
    enabled:
        - WebDriver:
            url: 'http://nginx:8083/'
            browser: chrome
            host: chromedriver
            port: 4444
            window_size: 1920x1080
            capabilities:
              goog:chromeOptions:
                args:
                  - "--no-sandbox"
                  - "--disable-dev-shm-usage"
                  - "--disable-gpu"
                  - "--headless"

# Add Codeception\Step\Retry trait to AcceptanceTester to enable retries
step_decorators:
    - Codeception\Step\ConditionalAssertion
    - Codeception\Step\TryTo
    - Codeception\Step\Retry
