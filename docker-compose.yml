services:

  nginx:
    build:
      context: ./Docker/nginx
    ports:
      - "${NGINX_PORT:-50080}:8083"
    volumes:
      - ./Docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf.template
      - ./Docker/nginx/ssl:/etc/nginx/ssl
      - ./Docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./Docker/nginx/proxy_params:/etc/nginx/proxy_params
      - ./Backend:${ENV_ORG_BACKEND_PATCH}
      - ./FrontEnd:${ENV_ORG_FRONT_PATCH}
      - ./Shared:${ENV_SHARED_PATCH}
      - ./Baza:${ENV_VHOD_PATCH}
      - ./Friendly:${ENV_DRUG_PATCH}
      - ./Docker/nginx/auth.basic:/etc/nginx/auth.basic
    user: user
    environment:
      - ENV_ORG_BACKEND_HOST=${ENV_ORG_BACKEND_HOST}
      - ENV_ORG_FRONTEND_HOST=${ENV_ORG_FRONTEND_HOST}
      - ENV_VHOD_BACKEND_HOST=${ENV_VHOD_BACKEND_HOST}
      - ENV_DRUG_BACKEND_HOST=${ENV_DRUG_BACKEND_HOST}

      - ENV_ORG_BACKEND_PATCH=${ENV_ORG_BACKEND_PATCH}
      - ENV_ORG_FRONT_PATCH=${ENV_ORG_FRONT_PATCH}
      - ENV_SHARED_PATCH=${ENV_SHARED_PATCH}
      - ENV_VHOD_PATCH=${ENV_VHOD_PATCH}
      - ENV_DRUG_PATCH=${ENV_DRUG_PATCH}

    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_started
      node:
        condition: service_started
      php:
        condition: service_started

  php:
    hostname: ${ENV_ORG_BACKEND_HOST}
    build:
      context: ./Docker/php
      args:
        - WITH_XDEBUG=false
    image: 'ogr_laravel'
    env_file:
      - ./Backend/.env
    container_name: php-solarSysto
    volumes:
      - ./Shared:${ENV_SHARED_PATCH}
      - ./Backend:/var/www/org
    working_dir: /var/www/org
    user: user
    environment:
      - WITH_XDEBUG=false
      - WORKING_DIR=${ENV_ORG_BACKEND_PATCH}
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  node:
    hostname: ${ENV_ORG_FRONTEND_HOST}
    build:
      context: ./Docker/node
    working_dir: ${ENV_ORG_FRONT_PATCH}
    ports:
      - "127.0.0.1:8082:8080"
    container_name: node-solarSysto
    volumes:
      - ./FrontEnd:${ENV_ORG_FRONT_PATCH}
    command: bash -c "npm install && npm run serve"
    user: node
    environment:
      - VUE_APP_API_URL=${VUE_APP_API_URL:-http://api.tickets.loc/}
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-v"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    build: ./Docker/redis
    container_name: redis-solarSysto
    command: redis-server --appendonly yes
    ports:
      - "8002:6379"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  mysql:
    image: mysql:8
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    ports:
      - "33069:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-systo}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER:-default}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./Docker/mysql/db:/var/lib/mysql
      - ./Docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  database:
    image: mysql:5.7
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_FRIENDLY_ROOT_PASSWORD}
      MYSQL_DATABASE: friendly
    volumes:
      - ./Docker/mysqlFriendly/db:/var/lib/mysql
      - ./Docker/mysqlFriendly/my.cnf:/etc/mysql/my.cnf
    ports:
      - "33065:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  phpBaza:
    hostname: ${ENV_VHOD_BACKEND_HOST}
    build:
      context: ./Docker/php
      args:
        - WITH_XDEBUG=false
    container_name: php-baza
    image: 'baza_laravel'
    env_file:
      - ./Baza/.env
    volumes:
      - ./Baza:/var/www/vhod
      - ./Shared:${ENV_SHARED_PATCH}
    working_dir: ${ENV_VHOD_PATCH}
    user: user
    environment:
      - WITH_XDEBUG=false
      - WORKING_DIR=${ENV_VHOD_PATCH}
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ./Docker/worker
    image: 'laravelworker'
    volumes:
      - ./Backend:${ENV_ORG_BACKEND_PATCH}
      - ./Friendly:${ENV_DRUG_PATCH}
      - ./Shared:${ENV_SHARED_PATCH}
      - ./Docker/php/error_reporting.ini:/usr/local/etc/php/conf.d/error_reporting.ini
      - ./Docker/worker/conf/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    user: user
    command: [ "supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf" ]
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: unless-stopped

networks:
  backend:
    driver: bridge
