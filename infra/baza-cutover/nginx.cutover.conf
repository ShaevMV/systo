# Cutover Baza Blade → PWA (Ф5, PR-10) — ПОДГОТОВЛЕНО, НЕ АКТИВИРОВАНО.
#
# ⛔ Раскомментировать ТОЛЬКО при активации cutover (см. CUTOVER_RUNBOOK.md):
#    после паритета + доказанного офлайна на реальном фесте, НЕ в фест-окно, с go владельца.
#
# Вставляется в server-блок vhod.spaceofjoy.ru. Перенаправляет UI-страницы Blade на PWA,
# сохраняя API и Blade-fallback на /legacy/*. API-роуты НЕ трогаем.

# --- UI cutover (закомментировано до активации) ---
# location = /        { return 302 /baza/; }
# location = /scan    { return 302 /baza/; }
# location = /search  { return 302 /baza/search; }

# --- Blade-fallback (доступен на время параллельной жизни) ---
# location = /legacy/scan   { try_files $uri /index.php?$query_string; }   # → Blade scanPage
# location = /legacy/search { try_files $uri /index.php?$query_string; }   # → Blade searchPage

# --- API остаётся как есть (используется и Blade, и PWA) ---
# /api/scan /api/enter /api/snapshot /api/blacklist /api/entry-events /api/search — без изменений.
