# ─────────────────────────────────────────────────────────────────────────────
#  Аварийный локальный узел КПП (Ф5, PR-9) — ОПЦИОНАЛЬНО.
#
#  Топология «облако-мастер»: по умолчанию телефоны работают против облака по сотовой —
#  этот узел НЕ нужен. Поднимается ТОЛЬКО как аварийный кэш-реле на КПП с полным блэкаутом
#  сотовой: отдаёт тот же контракт (/api/snapshot, /api/blacklist, /api/scan, /api/enter,
#  /api/entry-events) + статику BazaFront по локальному HTTPS (PR-7), телефоны синкаются
#  с ним по локальному Wi-Fi. Без rabbitmq/mailpit/pma/certbot — минимальный набор.
#
#  ⚠️ Скелет: требует доводки на реальном железе КПП (образы, дамп БД, сеть). См. README.md.
# ─────────────────────────────────────────────────────────────────────────────
services:
  kpp-mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: baza
      MYSQL_ROOT_PASSWORD: ${KPP_DB_ROOT_PASSWORD:-kpp-local}
    volumes:
      - kpp-db:/var/lib/mysql
      # Дамп билетов/смен кладётся build-offline-bundle.sh (минимизированный, B5).
      - ./bundle/baza-dump.sql:/docker-entrypoint-initdb.d/10-baza.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${KPP_DB_ROOT_PASSWORD:-kpp-local}"]
      interval: 10s
      timeout: 5s
      retries: 10

  kpp-php:
    image: kpp-baza-php:offline   # собирается build-offline-bundle.sh из Docker/baza
    restart: unless-stopped
    depends_on:
      kpp-mysql:
        condition: service_healthy
    environment:
      APP_ENV: production
      DB_HOST: kpp-mysql
      DB_DATABASE: baza
      DB_USERNAME: root
      DB_PASSWORD: ${KPP_DB_ROOT_PASSWORD:-kpp-local}
      # Узел-реле = тот же org-ingest-канал отключён (работаем по локальной БД).
    volumes:
      - ./bundle/baza:/var/www/vhod:ro

  kpp-nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - kpp-php
    ports:
      - "443:443"
    volumes:
      - ./nginx.kpp.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/certs:ro                      # серт от setup-local-ssl.sh (PR-7)
      - ./bundle/baza-front:/usr/share/nginx/baza:ro  # dist BazaFront (--base=/baza/)

volumes:
  kpp-db:
