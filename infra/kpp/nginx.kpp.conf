# nginx аварийного узла КПП (Ф5, PR-9) — ОПЦИОНАЛЬНО (облако-мастер).
# Локальный HTTPS (серт от setup-local-ssl.sh, PR-7) → статика BazaFront /baza/ + API Baza.
# Скелет: доводится под реальный php-fpm/пути.

server {
    listen 443 ssl;
    http2 on;
    server_name kpp.local;

    ssl_certificate     /certs/kpp.crt;
    ssl_certificate_key /certs/kpp.key;

    root /var/www/vhod/public;
    index index.php;

    # PWA BazaFront (собрана с --base=/baza/)
    location /baza/ {
        alias /usr/share/nginx/baza/;
        try_files $uri $uri/ /baza/index.html;
    }

    # API Baza (snapshot/blacklist/scan/enter/entry-events) + остальной Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass kpp-php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}

# HTTP → HTTPS (камера требует secure context)
server {
    listen 80;
    server_name kpp.local;
    return 301 https://$host$request_uri;
}
