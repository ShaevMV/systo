# ─────────────────────────────────────────────────────────────────────────────
#  staging.spaceofjoy.ru → Frontend (Vue SPA build, контейнер на 127.0.0.1:8080)
#
#  HTTP → 301 → HTTPS (после установки SSL через certbot).
#  До установки SSL — работает на 80 порту.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name staging.spaceofjoy.ru;

    # Для certbot http-challenge (renew)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ─── RabbitMQ Management UI на под-пути (за basic-auth) ───────────────────
    # Проксируем на контейнер rabbitmq-staging (127.0.0.1:8085 → 15672).
    # RabbitMQ сконфигурён с management.path_prefix=/rabbitmq, поэтому путь
    # сохраняется как есть. AMQP (5672) наружу не торчит — только эта UI.
    #
    # ВАЖНО: на сервере этот же location нужно добавить и в HTTPS (443) server-блок,
    # который генерит certbot (этот файл правится certbot'ом «на месте»). Здесь —
    # канонический сниппет; на проде он реально работает из 443-блока.
    location /rabbitmq/ {
        auth_basic            "Staging tools — restricted";
        auth_basic_user_file  /etc/nginx/auth/staging-tools.htpasswd;

        proxy_pass            http://127.0.0.1:8085;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_buffer_size     16k;
        proxy_buffers         4 16k;
        proxy_read_timeout    120s;
    }

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Размер запросов (для загрузки файлов / PDF билетов)
    client_max_body_size 20M;

    access_log /var/log/nginx/staging.spaceofjoy.ru.access.log;
    error_log  /var/log/nginx/staging.spaceofjoy.ru.error.log;
}
