# ─────────────────────────────────────────────────────────────────────────────
#  rabbitmq.staging.spaceofjoy.ru → RabbitMQ Management UI (контейнер на 127.0.0.1:8085)
#
#  Это ВЕБ-UI управления брокером (смотреть очереди/сообщения/политики), НЕ порт
#  приёма сообщений от qr (тот — AMQP/TLS 5671, отдельная «дверь», фаза 3 mTLS).
#
#  UI отдаётся под путём /rabbitmq/ (management.path_prefix в Docker/rabbitmq/rabbitmq.conf),
#  поэтому голый / редиректим на /rabbitmq/. Защита: basic auth (общий htpasswd
#  staging-tools, как pma/mail) + собственный логин RabbitMQ внутри UI.
#
#  443-блок и HTTP→HTTPS-редирект добавляет certbot --nginx (см. setup-rabbitmq-subdomain.sh).
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name rabbitmq.staging.spaceofjoy.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Голый корень → на UI (живёт под /rabbitmq/ из-за management.path_prefix).
    location = / {
        return 301 https://$host/rabbitmq/;
    }

    location /rabbitmq/ {
        auth_basic            "Staging tools — restricted";
        auth_basic_user_file  /etc/nginx/auth/staging-tools.htpasswd;

        proxy_pass            http://127.0.0.1:8085;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
    }

    access_log /var/log/nginx/rabbitmq.staging.spaceofjoy.ru.access.log;
    error_log  /var/log/nginx/rabbitmq.staging.spaceofjoy.ru.error.log;
}
